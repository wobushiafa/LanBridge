name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore LanBridge.slnx

      - name: Build
        run: dotnet build LanBridge.slnx -c Release --no-restore

      - name: Run xUnit tests
        run: dotnet test ./src/LanBridge.Tests/LanBridge.Tests.csproj -c Release --no-build --logger "trx;LogFileName=lanbridge-tests.trx"

      - name: Run KCP smoke checks
        run: dotnet run --project ./src/LanBridge.KcpTest/LanBridge.KcpTest.csproj -c Release -- --smoke-only
